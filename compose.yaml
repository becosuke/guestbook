services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: guestbook
      POSTGRES_USER: guestbook
      POSTGRES_PASSWORD: guestbook
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/configurations/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "guestbook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
