services:
  grpc:
    image: guestbook-api-grpc
    environment:
      ENVIRONMENT: development
      GRPC_HOST: grpc
      GRPC_PORT: "50051"
      DATABASE_URL: postgres://guestbook:guestbook@postgres:5432/guestbook?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  rest:
    image: guestbook-api-rest
    environment:
      ENVIRONMENT: development
      GRPC_HOST: grpc
      GRPC_PORT: "50051"
      REST_HOST: rest
      REST_PORT: "50080"
    ports:
      - "50080:50080"
    depends_on:
      - grpc

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: guestbook
      POSTGRES_USER: guestbook
      POSTGRES_PASSWORD: guestbook
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/configurations/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "guestbook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
