syntax = "proto3";

package pb;

option go_package = "github.com/becosuke/guestbook/internal/pkg/pb";

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

service GuestbookService {
  rpc GetPost (GetPostRequest) returns (Post) {
    option (google.api.http) = {
      get: "/api/v1/post/{post_id}"
    };
  }
  rpc CreatePost (CreatePostRequest) returns (Post) {
    option (google.api.http) = {
      post: "/api/v1/post"
      body: "*"
    };
  }
  rpc UpdatePost (UpdatePostRequest) returns (Post) {
    option (google.api.http) = {
      put: "/api/v1/post/{post.post_id}"
      body: "*"
    };
  }
  rpc DeletePost (DeletePostRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/post/{post_id}"
    };
  }
  rpc ListPosts (ListPostsRequest) returns (ListPostsResponse) {
    option (google.api.http) = {
      get: "/api/v1/posts/list/{page_size}/{page_token}"
    };
  }
}

message GetPostRequest {
  string post_id = 1 [(buf.validate.field).string.uuid = true];
}

message CreatePostRequest {
  Post post = 1 [(buf.validate.field).required = true];
  string idempotency_key = 2 [(buf.validate.field).string.uuid = true];
}

message UpdatePostRequest {
  Post post = 1 [(buf.validate.field).required = true];
  string idempotency_key = 2 [(buf.validate.field).string.uuid = true];
}

message DeletePostRequest {
  string post_id = 1 [(buf.validate.field).string.uuid = true];
  string idempotency_key = 2 [(buf.validate.field).string.uuid = true];
}

message ListPostsRequest {
  int32 page_size = 1 [(buf.validate.field).int32.gt = 0];
  string page_token = 2;
}

message ListPostsResponse {
  repeated Post posts = 1;
  string next_page_token = 2;
}

message Post {
  string post_id = 1 [(buf.validate.field).string.uuid = true];
  string body = 2 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  bool valid = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp create_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp update_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
  string previous_body = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}
