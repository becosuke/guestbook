version: "3"

services:
  guestbook-api-grpc:
    image: "guestbook-api-grpc"
    container_name: "guestbook-api-grpc"
    environment:
      - "ENVIRONMENT=development"
      - "GRPC_HOST=guestbook-api-grpc"
      - "GRPC_PORT=50051"

  guestbook-api-rest:
    image: "guestbook-api-rest"
    container_name: "guestbook-api-rest"
    environment:
      - "ENVIRONMENT=development"
      - "GRPC_HOST=guestbook-api-grpc"
      - "GRPC_PORT=50051"
      - "REST_HOST=guestbook-api-rest"
      - "REST_PORT=50080"
    ports:
      - "50080:50080"

  postgres:
    image: "postgres:16"
    container_name: "guestbook-postgres"
    environment:
      - "POSTGRES_USER=guestbook"
      - "POSTGRES_PASSWORD=guestbook"
      - "POSTGRES_DB=guestbook"
    ports:
      - "5432:5432"
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
      - "./api/configurations/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql"

volumes:
  postgres-data:
